server:
  port: 8083
  servlet:
    context-path: /

spring:
  application:
    name: user-service
  
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: bank-chatbot
        group: DEFAULT_GROUP
      config:
        server-addr: localhost:8848
        namespace: bank-chatbot
        group: DEFAULT_GROUP
        file-extension: yaml
        shared-configs:
          - data-id: user-common.yaml
            group: DEFAULT_GROUP
            refresh: true
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/user_service?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: 123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 15
      auto-commit: true
      idle-timeout: 30000
      pool-name: UserServiceHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  
  redis:
    host: localhost
    port: 6379
    database: 3
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
  
  session:
    store-type: redis
    redis:
      namespace: user:session
      flush-mode: on_save
      save-mode: always
    timeout: 3600 # 1小时
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME:your-email@gmail.com}
    password: ${EMAIL_PASSWORD:your-app-password}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: false
  security:
    user:
        name: admin
        password: admin
        oauth2:
          resourceserver:
            jwt:
              issuer-uri: http://localhost:8080/auth/realms/bank-chatbot

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    auto-mapping-behavior: partial
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false
  type-aliases-package: com.maretu.user.entity

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,sessions
  endpoint:
    health:
      show-details: always
    sessions:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.maretu.user: DEBUG
    org.springframework.web: DEBUG
    org.springframework.session: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/user-service.log
    max-size: 100MB
    max-history: 30

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: basic
  circuitbreaker:
    enabled: true
    group:
      enabled: true
    hystrix:
      enabled: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        failureRateThreshold: 50
        slowCallDurationThreshold: 5000
        slowCallRateThreshold: 100
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 5s
    instances:
      bank-service:
        baseConfig: default
      chatbot-service:
        baseConfig: default

# 安全配置
